<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" role="img" aria-label="Jaosef Agro Supplies">
  <!-- J mark with leaves, seed dot, and landscape rows -->
  <g transform="translate(4, 6)">
    <!-- Sprout leaves at top-left -->
    <path d="M14 6 C10 6 7 9 7 13 C7 16 9 19 13 19 C14 17 14 15 14 13 C14 11 14 8 14 6 Z" fill="#5c7a4a"/>
    <path d="M14 11 C18 11 21 14 21 17 C21 20 19 22 16 22 C15 20 14 18 14 16 C14 14 14 12 14 11 Z" fill="#7a9560"/>
    <!-- The J letter -->
    <path d="M26 8 L26 36 Q26 44 18 44 Q11 44 11 36"
          fill="none" stroke="#f5f0e8" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Seed dot above J -->
    <circle cx="26" cy="3" r="2.6" fill="#c75c2e"/>
    <!-- Landscape rows under the J -->
    <path d="M2 52 Q14 49 26 52 Q38 55 50 52" fill="none" stroke="#c75c2e" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M2 56 Q14 53 26 56 Q38 59 50 56" fill="none" stroke="#a8957a" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- JAOSEF wordmark -->
  <text x="66" y="34" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="800" fill="#f5f0e8" letter-spacing="2.5">JAOSEF</text>

  <!-- AGRO SUPPLIES subtitle -->
  <text x="66" y="49" font-family="'Inter', system-ui, sans-serif" font-size="8.5" font-weight="500" fill="#c75c2e" letter-spacing="4.5">AGRO SUPPLIES</text>
</svg>
